<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Sederhana</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    background:#555;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin:10px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Website Rental Camera</h1>
<p>Sewa Kamera & Alat Camping</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Produk</a>
<a href="#">Kontak</a>
</nav>

<div class="container">

<div class="card">
<h2>Kamera Canon</h2>
<p>Harga sewa: Rp150.000 / hari</p>
<button onclick="pesan()">Pesan</button>
</div>

<div class="card">
<h2>Tenda Camping</h2>
<p>Harga sewa: Rp80.000 / hari</p>
<button onclick="pesan()">Pesan</button>
</div>

</div>

<script>
function pesan(){
    alert("Pesanan berhasil!");
}
</script>

</body>
</html>
